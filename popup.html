<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>VoiceScroll</title>
<style>
  :root{--bg:#0f0f0f;--c:#181818;--g:#22c55e;--t:#f1f1f1;--m:#666;--b:#252525}
  *{box-sizing:border-box;margin:0;padding:0}
  body{width:280px;background:var(--bg);color:var(--t);font-family:system-ui,sans-serif;padding:15px}
  header{display:flex;align-items:center;gap:9px;margin-bottom:14px}
  h1{font-size:15px;font-weight:700;letter-spacing:.2px} 
  .s{font-size:10px;color:var(--m);margin-top:2px}
  #btn{width:100%;padding:12px;border-radius:9px;border:1.5px solid var(--b);background:var(--c);color:var(--t);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s;letter-spacing:.3px}
  #btn.on{background:rgba(34,197,94,.12);border-color:var(--g);box-shadow:0 0 12px rgba(34,197,94,.18)}
  .d{width:8px;height:8px;border-radius:50%;background:var(--m);transition:background .2s;flex-shrink:0}
  #btn.on .d{background:var(--g)}
  .sr{display:flex;justify-content:center;margin:10px 0 14px}
  #pill{background:var(--c);border:1px solid var(--b);border-radius:999px;padding:3px 12px;font-size:10px;color:var(--m);transition:all .25s;font-weight:600}
  #pill.on{background:rgba(34,197,94,.09);border-color:var(--g);color:var(--g)}
  .cmds{background:var(--c);border-radius:9px;padding:12px;border:1px solid var(--b)}
  .cmds h2{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--m);margin-bottom:8px}
  .r{display:flex;justify-content:space-between;align-items:center;padding:4px 0;border-bottom:1px solid var(--b)}
  .r:last-child{border:none} .w{font-size:12px;color:var(--m);font-weight:500}
  .k{background:rgba(255,255,255,.05);border-radius:4px;padding:3px 7px;font-size:11px;font-weight:700;font-family:monospace;color:#c8c8c8}
  .ht{text-align:center;font-size:10px;color:var(--m);margin-top:12px}
  kbd{background:var(--c);border:1px solid var(--b);border-radius:3px;padding:1px 5px;font-size:9px;box-shadow:0 1px 2px rgba(0,0,0,.3)}
</style></head>
<body>
<header><span style="font-size:22px">🎤</span>
  <div><h1>VoiceScroll</h1><div class="s">Bluetooth-optimized commands</div></div>
</header>
<button id="btn"><span class="d"></span><span id="bt">Enable VoiceScroll</span></button>
<div class="sr"><span id="pill">● Inactive</span></div>
<div class="cmds">
  <h2>Commands</h2>
  <div class="r"><span class="w">Scroll down</span><span class="k">"down"</span></div>
  <div class="r"><span class="w">Scroll up</span><span class="k">"back"</span></div>
  <div class="r"><span class="w">Page down</span><span class="k">"page down"</span></div>
  <div class="r"><span class="w">Page up</span><span class="k">"reverse"</span></div>
  <div class="r"><span class="w">Jump to top</span><span class="k">"top"</span></div>
  <div class="r"><span class="w">Jump to bottom</span><span class="k">"bottom"</span></div>
</div>
<p class="ht"><kbd>Alt</kbd>+<kbd>Shift</kbd>+<kbd>V</kbd> to toggle on/off</p>
<script src="popup.js"></script>
</body></html>
